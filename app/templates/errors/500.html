<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro interno - ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/errors.css') }}" rel="stylesheet">
</head>
<body class="error-page error-page-500">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="error-container">
                    <div class="error-code">500</div>
                    <div class="error-message">
                        <h2><i class="fas fa-exclamation-triangle me-2"></i>Erro Interno</h2>
                        <p class="text-muted">Algo deu errado. Nossa equipe foi notificada.</p>
                    </div>
                    <div class="mt-4">
                        <a href="/" class="btn btn-primary me-3">
                            <i class="fas fa-home me-2"></i>Voltar ao Dashboard
                        </a>
                        <a href="javascript:location.reload()" class="btn btn-outline-secondary">
                            <i class="fas fa-redo me-2"></i>Tentar Novamente
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
