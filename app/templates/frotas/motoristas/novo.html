{% extends "base.html" %}

{% block title %}Novo Motorista{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">
            <i class="fas fa-id-card me-2"></i>Cadastrar Novo Motorista
        </h1>
        <a href="/frotas/motoristas" class="btn btn-secondary">
            <i class="fas fa-arrow-left me-2"></i>Voltar
        </a>
    </div>

    <div class="card shadow mb-4">
        <div class="card-body">
            <form id="formMotorista">
                <!-- Dados Pessoais -->
                <h5 class="text-primary mb-3">
                    <i class="fas fa-user me-2"></i>Dados Pessoais
                </h5>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Nome Completo *</label>
                        <input type="text" class="form-control" name="nome" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">CPF *</label>
                        <input type="text" class="form-control" name="cpf" required 
                               placeholder="000.000.000-00">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">RG</label>
                        <input type="text" class="form-control" name="rg">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-3">
                        <label class="form-label">Data de Nascimento *</label>
                        <input type="date" class="form-control" name="data_nascimento" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Telefone</label>
                        <input type="text" class="form-control" name="telefone" 
                               placeholder="(11) 99999-9999">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email">
                    </div>
                </div>

                <hr>

                <!-- CNH -->
                <h5 class="text-primary mb-3">
                    <i class="fas fa-id-card-alt me-2"></i>Dados da CNH
                </h5>
                
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">Número da CNH *</label>
                        <input type="text" class="form-control" name="cnh_numero" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Categoria *</label>
                        <select class="form-select" name="cnh_categoria" required>
                            <option value="">Selecione...</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                            <option value="D">D</option>
                            <option value="E">E</option>
                            <option value="AB">AB</option>
                            <option value="AC">AC</option>
                            <option value="AD">AD</option>
                            <option value="AE">AE</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Validade da CNH *</label>
                        <input type="date" class="form-control" name="cnh_validade" required>
                    </div>
                </div>

                <hr>

                <!-- Exames e Cursos -->
                <h5 class="text-primary mb-3">
                    <i class="fas fa-file-medical me-2"></i>Exames e Cursos
                </h5>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Validade do Exame Médico</label>
                        <input type="date" class="form-control" name="exame_medico_validade">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Validade MOPP</label>
                        <input type="date" class="form-control" name="mopp_validade">
                        <small class="text-muted">Movimentação de Produtos Perigosos</small>
                    </div>
                </div>

                <hr>

                <!-- Endereço -->
                <h5 class="text-primary mb-3">
                    <i class="fas fa-map-marker-alt me-2"></i>Endereço
                </h5>
                
                <div class="row mb-3">
                    <div class="col-md-12">
                        <label class="form-label">Endereço Completo</label>
                        <input type="text" class="form-control" name="endereco">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-5">
                        <label class="form-label">Cidade</label>
                        <input type="text" class="form-control" name="cidade">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Estado</label>
                        <select class="form-select" name="estado">
                            <option value="">UF</option>
                            <option value="AC">AC</option>
                            <option value="AL">AL</option>
                            <option value="AP">AP</option>
                            <option value="AM">AM</option>
                            <option value="BA">BA</option>
                            <option value="CE">CE</option>
                            <option value="DF">DF</option>
                            <option value="ES">ES</option>
                            <option value="GO">GO</option>
                            <option value="MA">MA</option>
                            <option value="MT">MT</option>
                            <option value="MS">MS</option>
                            <option value="MG">MG</option>
                            <option value="PA">PA</option>
                            <option value="PB">PB</option>
                            <option value="PR">PR</option>
                            <option value="PE">PE</option>
                            <option value="PI">PI</option>
                            <option value="RJ">RJ</option>
                            <option value="RN">RN</option>
                            <option value="RS">RS</option>
                            <option value="RO">RO</option>
                            <option value="RR">RR</option>
                            <option value="SC">SC</option>
                            <option value="SP">SP</option>
                            <option value="SE">SE</option>
                            <option value="TO">TO</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">CEP</label>
                        <input type="text" class="form-control" name="cep" placeholder="00000-000">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Tipo</label>
                        <select class="form-select" name="terceiro">
                            <option value="false">Funcionário</option>
                            <option value="true">Terceiro</option>
                        </select>
                    </div>
                </div>

                <hr>

                <!-- Observações -->
                <div class="row mb-3">
                    <div class="col-md-12">
                        <label class="form-label">Observações</label>
                        <textarea class="form-control" name="observacoes" rows="3"></textarea>
                    </div>
                </div>

                <div class="text-end">
                    <button type="button" class="btn btn-secondary" onclick="window.history.back()">
                        <i class="fas fa-times me-2"></i>Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i>Cadastrar Motorista
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.getElementById('formMotorista').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());
    data.terceiro = data.terceiro === 'true';
    
    fetch('/frotas/motoristas/novo', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(result => {
        if (result.status === 'success') {
            alert('Motorista cadastrado com sucesso!');
            window.location.href = '/frotas/motoristas';
        } else {
            alert('Erro: ' + result.message);
        }
    })
    .catch(error => {
        alert('Erro ao cadastrar motorista: ' + error);
    });
});
</script>
{% endblock %}
