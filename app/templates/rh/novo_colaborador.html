{% extends "base.html" %}

{% block title %}Novo Colaborador{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">
            <i class="fas fa-user-plus me-2"></i>Novo Colaborador
        </h1>
        <a href="/rh/colaboradores" class="btn btn-secondary">
            <i class="fas fa-arrow-left me-1"></i>Voltar
        </a>
    </div>

    <div class="card shadow">
        <div class="card-header">
            <h6 class="m-0 font-weight-bold text-primary">Cadastro de Colaborador</h6>
        </div>
        <div class="card-body">
            <form id="formColaborador">

                <h6 class="text-primary mb-3 border-bottom pb-2">Dados Pessoais</h6>
                <div class="row">
                    <div class="col-md-5">
                        <div class="mb-3">
                            <label for="nome_completo" class="form-label">Nome Completo *</label>
                            <input type="text" class="form-control" id="nome_completo" required>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label for="cpf" class="form-label">CPF *</label>
                            <input type="text" class="form-control" id="cpf" maxlength="14" required>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="mb-3">
                            <label for="rg" class="form-label">RG</label>
                            <input type="text" class="form-control" id="rg">
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="mb-3">
                            <label for="sexo" class="form-label">Sexo</label>
                            <select class="form-select" id="sexo">
                                <option value="">-</option>
                                <option value="M">Masculino</option>
                                <option value="F">Feminino</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label for="data_nascimento" class="form-label">Data de Nascimento</label>
                            <input type="date" class="form-control" id="data_nascimento">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label for="estado_civil" class="form-label">Estado Civil</label>
                            <select class="form-select" id="estado_civil">
                                <option value="">-</option>
                                <option value="Solteiro(a)">Solteiro(a)</option>
                                <option value="Casado(a)">Casado(a)</option>
                                <option value="Divorciado(a)">Divorciado(a)</option>
                                <option value="Viuvo(a)">Viuvo(a)</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label for="email" class="form-label">E-mail</label>
                            <input type="email" class="form-control" id="email">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label for="celular" class="form-label">Celular</label>
                            <input type="text" class="form-control" id="celular">
                        </div>
                    </div>
                </div>

                <h6 class="text-primary mb-3 border-bottom pb-2 mt-4">Endereco</h6>
                <div class="row">
                    <div class="col-md-2">
                        <div class="mb-3">
                            <label for="cep" class="form-label">CEP</label>
                            <input type="text" class="form-control" id="cep" maxlength="9">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="endereco" class="form-label">Endereco</label>
                            <input type="text" class="form-control" id="endereco">
                        </div>
                    </div>
                    <div class="col-md-1">
                        <div class="mb-3">
                            <label for="numero" class="form-label">Numero</label>
                            <input type="text" class="form-control" id="numero">
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="mb-3">
                            <label for="bairro" class="form-label">Bairro</label>
                            <input type="text" class="form-control" id="bairro">
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="mb-3">
                            <label for="cidade" class="form-label">Cidade</label>
                            <input type="text" class="form-control" id="cidade">
                        </div>
                    </div>
                    <div class="col-md-1">
                        <div class="mb-3">
                            <label for="estado" class="form-label">UF</label>
                            <select class="form-select" id="estado">
                                <option value="">-</option>
                                <option>AC</option><option>AL</option><option>AP</option><option>AM</option>
                                <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
                                <option>GO</option><option>MA</option><option>MT</option><option>MS</option>
                                <option>MG</option><option>PA</option><option>PB</option><option>PR</option>
                                <option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
                                <option>RS</option><option>RO</option><option>RR</option><option>SC</option>
                                <option>SP</option><option>SE</option><option>TO</option>
                            </select>
                        </div>
                    </div>
                </div>

                <h6 class="text-primary mb-3 border-bottom pb-2 mt-4">Dados Profissionais</h6>
                <div class="row">
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label for="cargo_id" class="form-label">Cargo</label>
                            <select class="form-select" id="cargo_id">
                                <option value="">Selecione</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label for="departamento_id" class="form-label">Departamento</label>
                            <select class="form-select" id="departamento_id">
                                <option value="">Selecione</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label for="data_admissao" class="form-label">Data de Admissao *</label>
                            <input type="date" class="form-control" id="data_admissao" required>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label for="tipo_contrato" class="form-label">Tipo de Contrato</label>
                            <select class="form-select" id="tipo_contrato">
                                <option value="CLT">CLT</option>
                                <option value="PJ">PJ</option>
                                <option value="Estagiario">Estagiario</option>
                                <option value="Temporario">Temporario</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label for="salario_base" class="form-label">Salario Base (R$)</label>
                            <input type="number" class="form-control" id="salario_base" step="0.01" min="0">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label for="jornada_trabalho" class="form-label">Jornada de Trabalho</label>
                            <input type="text" class="form-control" id="jornada_trabalho" value="44h semanais">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label for="matricula" class="form-label">Matricula</label>
                            <input type="text" class="form-control" id="matricula" placeholder="Gerada automaticamente">
                        </div>
                    </div>
                </div>

                <h6 class="text-primary mb-3 border-bottom pb-2 mt-4">Dados Bancarios</h6>
                <div class="row">
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label for="banco" class="form-label">Banco</label>
                            <input type="text" class="form-control" id="banco">
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="mb-3">
                            <label for="agencia" class="form-label">Agencia</label>
                            <input type="text" class="form-control" id="agencia">
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="mb-3">
                            <label for="conta" class="form-label">Conta</label>
                            <input type="text" class="form-control" id="conta">
                        </div>
                    </div>
                    <div class="col-md-2">
                        <div class="mb-3">
                            <label for="tipo_conta" class="form-label">Tipo</label>
                            <select class="form-select" id="tipo_conta">
                                <option value="">-</option>
                                <option value="Corrente">Corrente</option>
                                <option value="Poupanca">Poupanca</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="mb-3">
                            <label for="pix" class="form-label">Chave PIX</label>
                            <input type="text" class="form-control" id="pix">
                        </div>
                    </div>
                </div>

                <div class="text-end mt-4">
                    <a href="/rh/colaboradores" class="btn btn-secondary me-2">
                        <i class="fas fa-times me-1"></i>Cancelar
                    </a>
                    <button type="button" class="btn btn-success" id="btnSalvar" onclick="salvarColaborador()">
                        <i class="fas fa-save me-1"></i>Salvar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('data_admissao').value = new Date().toISOString().split('T')[0];
    carregarCargos();
    carregarDepartamentos();

    document.getElementById('cpf').addEventListener('input', function(e) {
        var v = e.target.value.replace(/\D/g, '');
        if (v.length > 11) v = v.slice(0, 11);
        if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
        else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
        else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
        e.target.value = v;
    });
});

function carregarCargos() {
    fetch('/rh/api/cargos')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.status === 'success') {
                var select = document.getElementById('cargo_id');
                data.cargos.forEach(function(c) {
                    var opt = document.createElement('option');
                    opt.value = c.id;
                    opt.textContent = c.nome;
                    select.appendChild(opt);
                });
            }
        });
}

function carregarDepartamentos() {
    fetch('/rh/api/departamentos')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.status === 'success') {
                var select = document.getElementById('departamento_id');
                data.departamentos.forEach(function(d) {
                    var opt = document.createElement('option');
                    opt.value = d.id;
                    opt.textContent = d.nome;
                    select.appendChild(opt);
                });
            }
        });
}

function salvarColaborador() {
    var form = document.getElementById('formColaborador');
    if (!form.checkValidity()) { form.reportValidity(); return; }

    var btn = document.getElementById('btnSalvar');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>Salvando...';

    var dados = {
        nome_completo: document.getElementById('nome_completo').value.trim(),
        cpf: document.getElementById('cpf').value.trim(),
        rg: document.getElementById('rg').value.trim(),
        sexo: document.getElementById('sexo').value,
        data_nascimento: document.getElementById('data_nascimento').value || null,
        estado_civil: document.getElementById('estado_civil').value,
        email: document.getElementById('email').value.trim(),
        celular: document.getElementById('celular').value.trim(),
        cep: document.getElementById('cep').value.trim(),
        endereco: document.getElementById('endereco').value.trim(),
        numero: document.getElementById('numero').value.trim(),
        bairro: document.getElementById('bairro').value.trim(),
        cidade: document.getElementById('cidade').value.trim(),
        estado: document.getElementById('estado').value,
        cargo_id: document.getElementById('cargo_id').value || null,
        departamento_id: document.getElementById('departamento_id').value || null,
        data_admissao: document.getElementById('data_admissao').value,
        tipo_contrato: document.getElementById('tipo_contrato').value,
        salario_base: parseFloat(document.getElementById('salario_base').value) || null,
        jornada_trabalho: document.getElementById('jornada_trabalho').value.trim(),
        matricula: document.getElementById('matricula').value.trim() || null,
        banco: document.getElementById('banco').value.trim(),
        agencia: document.getElementById('agencia').value.trim(),
        conta: document.getElementById('conta').value.trim(),
        tipo_conta: document.getElementById('tipo_conta').value,
        pix: document.getElementById('pix').value.trim()
    };

    fetch('/rh/api/colaboradores', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(dados)
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.status === 'success') {
            alert('Colaborador cadastrado com sucesso! Matricula: ' + data.colaborador.matricula);
            window.location.href = '/rh/colaboradores';
        } else {
            alert('Erro: ' + data.message);
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save me-1"></i>Salvar';
        }
    })
    .catch(function(err) {
        alert('Erro de conexao: ' + err.message);
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save me-1"></i>Salvar';
    });
}
</script>
{% endblock %}
